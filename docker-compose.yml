version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orahai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orahai
      POSTGRES_PASSWORD: orahai_pass
      POSTGRES_DB: orahai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orahai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orahai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (local S3) ──────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: orahai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: orahai-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://orahai:orahai_pass@postgres:5432/orahai
      REDIS_URL: redis://redis:6379
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: orahai-workspaces
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ── AI Service ────────────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: orahai-ai
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"

  # ── Frontend ──────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: orahai-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    environment:
      NEXTAUTH_URL: http://localhost:3000
      API_URL: http://api:4000
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "3000:3000"

  # ── Sandbox network (isolated) ────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: orahai-network
