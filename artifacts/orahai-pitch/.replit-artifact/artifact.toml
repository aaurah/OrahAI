kind = "slides"
previewPath = "/orahai-pitch/"
title = "OrahAI Pitch Deck"
version = "1.0.0"
id = "artifacts/orahai-pitch"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/orahai-pitch/" ]
localPort = 20177

[services.development]
run = "pnpm --filter @workspace/orahai-pitch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orahai-pitch", "run", "build" ]
publicDir = "artifacts/orahai-pitch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20177"
BASE_PATH = "/orahai-pitch/"
