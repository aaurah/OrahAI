version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       orahai
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (sessions / future queues) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/orahai
      SANDBOX_URL:  http://sandbox:5000
      AI_SERVICE_URL: http://ai:8000
    depends_on:
      db:
        condition: service_healthy

  # ── Sandbox runner ───────────────────────────────────────────────────────────
  sandbox:
    build:
      context: apps/sandbox
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      API_URL: http://api:4000

  # ── AI service ───────────────────────────────────────────────────────────────
  ai:
    build:
      context: apps/ai
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env

  # ── Web (Next.js) ─────────────────────────────────────────────────────────
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  db-data:
  redis-data:
